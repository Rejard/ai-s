<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 🌟 모바일 PWA 진짜 네이티브 앱처럼 설치(Add to Home Screen) 지원 메타데이터 설정 -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ai S" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <title>Ai S</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- 🌟 백그라운드 PWA 서비스 워커 자동 등록 엔진 가동 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✔ PWA ServiceWorker registered successfully:', reg.scope))
            .catch(err => console.log('❌ PWA ServiceWorker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
